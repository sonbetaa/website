<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background circles */
    .hero::before,
    .hero::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
    }

    .hero::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #6c63ff, transparent);
      top: -100px;
      left: -100px;
    }

    .hero::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #ff6584, transparent);
      bottom: -80px;
      right: -80px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .hero-content {
      text-align: center;
      color: #fff;
      position: relative;
      z-index: 1;
      padding: 2rem;
      max-width: 800px;
    }

    .badge {
      display: inline-block;
      background: rgba(108, 99, 255, 0.3);
      border: 1px solid rgba(108, 99, 255, 0.6);
      color: #a89eff;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1.25rem;
      background: linear-gradient(90deg, #fff 0%, #a89eff 50%, #ff6584 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: rgba(255, 255, 255, 0.65);
      max-width: 560px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: none;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      color: #fff;
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 12px 32px rgba(108, 99, 255, 0.6);
    }

    .btn-outline {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.6);
    }

    /* Stats row */
    .stats {
      display: flex;
      gap: 3rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      display: block;
    }

    .stat-label {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <span class="badge">✦ Welcome</span>
      <h1 class="hero-title">Xây dựng những<br/>điều tuyệt vời</h1>
      <p class="hero-subtitle">
        Một nền tảng hiện đại giúp bạn tạo ra trải nghiệm web đẹp mắt,
        nhanh chóng và dễ dàng hơn bao giờ hết.
      </p>

      <div class="hero-actions">
        <a href="#" class="btn btn-primary">
          Bắt đầu ngay →
        </a>
        <a href="#" class="btn btn-outline">
          Tìm hiểu thêm
        </a>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-number">10K+</span>
          <span class="stat-label">Người dùng</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">500+</span>
          <span class="stat-label">Dự án</span>
        </div>
        <div class="stat-item">
          <span class="stat-number">99%</span>
          <span class="stat-label">Hài lòng</span>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
