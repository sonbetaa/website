<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    .hero p {
      font-size: 1.2rem;
      color: #aaa;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .hero a {
      background: #e94560;
      color: #fff;
      padding: 0.8rem 2rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .hero a:hover {
      background: #c73652;
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>Welcome</h1>
    <p>A clean, simple website with one focused section to get you started.</p>
    <a href="#">Get Started</a>
  </section>

</body>
</html>
