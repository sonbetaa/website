<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Doanh thu thuê xe</title>
<meta name="theme-color" content="#059669">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Doanh thu">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    color: #1f2937;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 460px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
    overflow: hidden;
  }
  .header {
    background: #059669;
    color: #fff;
    padding: 22px 24px;
    text-align: center;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 13px; opacity: .85; margin-top: 4px; }
  .nav { display: flex; background: #047857; }
  .nav a {
    flex: 1; text-align: center; padding: 12px;
    color: #a7f3d0; text-decoration: none;
    font-size: 14px; font-weight: 600;
  }
  .nav a.active { color: #fff; background: #059669; }

  .filter {
    display: flex;
    gap: 8px;
    padding: 16px 24px 0;
    flex-wrap: wrap;
  }
  .filter button {
    flex: 1;
    min-width: 70px;
    padding: 9px 6px;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    cursor: pointer;
  }
  .filter button.active { background: #059669; color: #fff; border-color: #059669; }
  .month-pick { padding: 12px 24px 0; }
  .month-pick input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    font-size: 14px;
  }
  .month-pick.hidden { display: none; }

  .rev-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 16px 24px;
  }
  .stat { background: #f0fdf4; border-radius: 12px; padding: 12px; text-align: center; }
  .stat .num { font-size: 17px; font-weight: 800; color: #047857; }
  .stat .label { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .stat.big { grid-column: 1 / -1; background: #d1fae5; }
  .stat.big .num { font-size: 26px; color: #065f46; }

  .toolbar { display: flex; gap: 10px; padding: 0 24px 12px; }
  .toolbar button {
    flex: 1; padding: 10px; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-export { background: #ecfdf5; color: #047857; }
  .btn-clear { background: #fef2f2; color: #dc2626; }

  .list { padding: 0 24px 20px; }
  .list-title { font-size: 13px; font-weight: 700; color: #6b7280; margin-bottom: 10px; }
  .empty { text-align: center; color: #9ca3af; font-size: 13px; padding: 30px 0; }
  .item { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .item .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .item .name { font-weight: 700; font-size: 15px; }
  .item .plate { font-size: 12px; color: #6b7280; }
  .item .amount { font-weight: 800; color: #047857; font-size: 15px; white-space: nowrap; }
  .item .meta { font-size: 12px; color: #6b7280; margin-top: 6px; line-height: 1.6; }
  .item .del {
    background: none; border: none; color: #dc2626;
    font-size: 12px; cursor: pointer; padding: 4px 0; margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>📊 Doanh Thu</h1>
      <p>Tổng hợp các đơn đã lưu</p>
    </div>
    <div class="nav">
      <a href="index.html">Tính giá</a>
      <a href="doanhthu.html" class="active">📊 Doanh thu</a>
    </div>

    <div class="filter">
      <button data-range="all" class="active">Tất cả</button>
      <button data-range="today">Hôm nay</button>
      <button data-range="month">Tháng này</button>
      <button data-range="pick">Chọn tháng</button>
    </div>
    <div class="month-pick hidden" id="monthPickWrap">
      <input type="month" id="monthInput">
    </div>

    <div class="rev-stats">
      <div class="stat big">
        <div class="num" id="totalRevenue">0 đ</div>
        <div class="label">TỔNG DOANH THU (tiền thuê + phụ phí)</div>
      </div>
      <div class="stat">
        <div class="num" id="totalRent">0 đ</div>
        <div class="label">Tiền thuê xe</div>
      </div>
      <div class="stat">
        <div class="num" id="totalSurcharge">0 đ</div>
        <div class="label">Phụ phí</div>
      </div>
      <div class="stat">
        <div class="num" id="orderCount">0</div>
        <div class="label">Số đơn</div>
      </div>
      <div class="stat">
        <div class="num" id="totalRemaining">0 đ</div>
        <div class="label">Còn phải thu</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn-export" id="exportBtn">⬇ Xuất Excel/CSV</button>
      <button class="btn-clear" id="clearBtn">🗑 Xóa tất cả</button>
    </div>

    <div class="list">
      <div class="list-title" id="listTitle">Danh sách đơn</div>
      <div id="orderList"></div>
    </div>
  </div>

<script>
  const $ = id => document.getElementById(id);
  const STORAGE_KEY = 'carRentalOrders';

  const fmt = n => (Number(n) || 0).toLocaleString('vi-VN') + ' đ';
  const fmtDate = s => s ? s.split('-').reverse().join('/') : '?';

  function loadOrders() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveOrders(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  let currentRange = 'all';

  // Lọc đơn theo khoảng thời gian (dựa vào ngày bắt đầu thuê)
  function filterOrders(orders) {
    const now = new Date();
    if (currentRange === 'today') {
      const t = now.toLocaleDateString('en-CA');
      return orders.filter(o => o.fromDate === t);
    }
    if (currentRange === 'month') {
      const m = now.toLocaleDateString('en-CA').slice(0, 7);
      return orders.filter(o => (o.fromDate || '').slice(0, 7) === m);
    }
    if (currentRange === 'pick') {
      const m = $('monthInput').value;
      if (!m) return orders;
      return orders.filter(o => (o.fromDate || '').slice(0, 7) === m);
    }
    return orders;
  }

  function render() {
    const all = loadOrders();
    const orders = filterOrders(all);

    let totalRent = 0, totalSurcharge = 0, totalRemaining = 0;
    orders.forEach(o => {
      totalRent += Number(o.rentTotal) || 0;
      totalSurcharge += Number(o.surcharge) || 0;
      totalRemaining += Number(o.remaining) || 0;
    });

    $('totalRevenue').textContent = fmt(totalRent + totalSurcharge);
    $('totalRent').textContent = fmt(totalRent);
    $('totalSurcharge').textContent = fmt(totalSurcharge);
    $('orderCount').textContent = orders.length;
    $('totalRemaining').textContent = fmt(totalRemaining);

    const list = $('orderList');
    if (orders.length === 0) {
      list.innerHTML = '<div class="empty">Không có đơn nào trong khoảng này.</div>';
      return;
    }

    list.innerHTML = orders.map((o, i) => {
      const key = o.id != null ? `id:${o.id}` : `idx:${all.indexOf(o)}`;
      return `
      <div class="item">
        <div class="top">
          <div>
            <div class="name">${o.customer || 'Khách lẻ'}</div>
            <div class="plate">${o.plate || 'Chưa có biển số'}</div>
          </div>
          <div class="amount">${fmt((Number(o.rentTotal)||0) + (Number(o.surcharge)||0))}</div>
        </div>
        <div class="meta">
          📅 ${fmtDate(o.fromDate)} → ${fmtDate(o.toDate)} (${o.days} ngày)<br>
          Thuê: ${fmt(o.rentTotal)} · Phụ phí: ${fmt(o.surcharge)} · Cọc: ${fmt(o.deposit)}<br>
          Còn lại phải thu: <b>${fmt(o.remaining)}</b>
        </div>
        <button class="del" data-key="${key}">✕ Xóa đơn này</button>
      </div>`;
    }).join('');

    list.querySelectorAll('.del').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        const arr = loadOrders();
        if (key.startsWith('id:')) {
          const id = key.slice(3);
          const idx = arr.findIndex(o => String(o.id) === id);
          if (idx > -1) arr.splice(idx, 1);
        } else {
          arr.splice(Number(key.slice(4)), 1);
        }
        saveOrders(arr);
        render();
      });
    });
  }

  // Bộ lọc
  document.querySelectorAll('.filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRange = btn.dataset.range;
      $('monthPickWrap').classList.toggle('hidden', currentRange !== 'pick');
      render();
    });
  });
  $('monthInput').addEventListener('change', render);

  // Xuất CSV (mở được bằng Excel)
  $('exportBtn').addEventListener('click', () => {
    const orders = filterOrders(loadOrders());
    if (orders.length === 0) { alert('Không có đơn để xuất.'); return; }
    const header = ['Tên khách', 'Biển số', 'Từ ngày', 'Đến ngày', 'Số ngày', 'Giá/ngày', 'Tiền thuê', 'Phụ phí', 'Đặt cọc', 'Còn lại', 'Doanh thu'];
    const rows = orders.map(o => [
      o.customer, o.plate, o.fromDate, o.toDate, o.days,
      o.pricePerDay, o.rentTotal, o.surcharge, o.deposit, o.remaining,
      (Number(o.rentTotal)||0) + (Number(o.surcharge)||0)
    ]);
    const csv = [header, ...rows]
      .map(r => r.map(c => `"${String(c == null ? '' : c).replace(/"/g, '""')}"`).join(','))
      .join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'doanh-thu-thue-xe.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  $('clearBtn').addEventListener('click', () => {
    if (confirm('Xóa TẤT CẢ đơn đã lưu? Không thể hoàn tác.')) {
      saveOrders([]);
      render();
    }
  });

  render();

  // ---- PWA: chạy offline ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
